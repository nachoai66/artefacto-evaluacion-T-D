function getGsUrl(){try{return localStorage.getItem("eval3eso_gsurl")||APPS_SCRIPT_URL_DEFAULT||"";}catch(e){return APPS_SCRIPT_URL_DEFAULT||"";}}
function setGsUrl(u){try{localStorage.setItem("eval3eso_gsurl",u);}catch(e){}}

// ── Persistencia localStorage (caché local) ──
const LS_KEY="eval3eso_";
function lsGet(k,def){try{var v=localStorage.getItem(LS_KEY+k);return v?JSON.parse(v):def;}catch(e){return def;}}
function lsSet(k,v){try{localStorage.setItem(LS_KEY+k,JSON.stringify(v));}catch(e){}}

// ── Google Sheets helpers ──
// GET para leer datos (fetch con manejo robusto de redirects)
function gsGet(){
  var url=getGsUrl();
  if(!url)return Promise.resolve(null);
  return fetch(url+"?action=load&t="+Date.now(),{redirect:"follow"})
    .then(function(r){
      if(!r.ok)throw new Error("HTTP "+r.status);
      return r.text();
    })
    .then(function(txt){
      try{return JSON.parse(txt);}
      catch(e){console.error("GS parse:",txt.substring(0,200));throw e;}
    })
    .catch(function(e){console.error("GS load:",e);return null;});
}

// POST para escribir datos (iframe+form, evita CORS)
var _gsQueue=[];var _gsFlush=null;
function gsSend(action,data){
  var url=getGsUrl();
  if(!url)return;
  var payload=JSON.stringify(Object.assign({},data,{action:action}));

  var ifr=document.createElement("iframe");
  ifr.name="gsi"+Date.now()+Math.random();
  ifr.style.display="none";
  document.body.appendChild(ifr);

  var frm=document.createElement("form");
  frm.method="POST";
  frm.action=url;
  frm.target=ifr.name;

  var inp=document.createElement("input");
  inp.type="hidden";inp.name="payload";inp.value=payload;
  frm.appendChild(inp);

  document.body.appendChild(frm);
  frm.submit();

  setTimeout(function(){
    try{document.body.removeChild(frm);}catch(e){}
    try{document.body.removeChild(ifr);}catch(e){}
  },10000);
}

// ── Resaltado de sintaxis estilo Thonny Dark ──
const TH={bg:"#1e1e2e",fg:"#cdd6f4",kw:"#cba6f7",bi:"#89b4fa",num:"#fab387",str:"#a6e3a1",cmt:"#6c7086",op:"#89dceb",mth:"#f9e2af"};
const PY_KW=["from","import","if","elif","else","while","for","in","def","return","True","False","None","and","or","not","print","class","try","except","as","pass","break","continue"];
const PY_BI=["ADC","Pin","PWM","machine","sleep","range"];
function pyHL(code){
  var lines=code.split("\\n");
  var elems=[];var k=0;
  lines.forEach(function(line,li){
    if(li>0)elems.push(React.createElement("br",{key:"br"+k++}));
    var re=/(#[^\n]*)|(\"[^\"]*\"|\'[^\']*\')|([a-zA-Z_]\w*)|(\d+)|(\s+)|(.)/g;
    var m;
    while((m=re.exec(line))!==null){
      var txt=m[0],color=TH.fg,fw=400;
      if(m[1]){color=TH.cmt;}
      else if(m[2]){color=TH.str;}
      else if(m[3]){
        if(PY_KW.indexOf(m[3])>=0){color=TH.kw;fw=700;}
        else if(PY_BI.indexOf(m[3])>=0){color=TH.bi;}
        else if(txt==="read_u16"||txt==="duty_u16"||txt==="value"||txt==="freq"||txt==="read"||txt==="read_digital"||txt==="write_angle"||txt==="set_pwm"||txt==="pwm_set"){color=TH.mth;}
      }
      else if(m[4]){color=TH.num;}
      else if(m[6]){color=TH.op;}
      elems.push(React.createElement("span",{key:"t"+k++,style:{color:color,fontWeight:fw}},txt));
    }
  });
  return elems;
}

// ── Resaltado de sintaxis → HTML string (para PDF) ──
function pyHLhtml(code){
  var lines=code.split("\\n");var html="";
  lines.forEach(function(line,li){
    if(li>0)html+="<br/>";
    var re=/(#[^\n]*)|(\"[^\"]*\"|\'[^\']*\')|([a-zA-Z_]\w*)|(\d+)|(\s+)|(.)/g;
    var m;
    while((m=re.exec(line))!==null){
      var txt=m[0],color=TH.fg,fw=400;
      if(m[1]){color=TH.cmt;}
      else if(m[2]){color=TH.str;}
      else if(m[3]){
        if(PY_KW.indexOf(m[3])>=0){color=TH.kw;fw=700;}
        else if(PY_BI.indexOf(m[3])>=0){color=TH.bi;}
        else if(["read_u16","duty_u16","value","freq","read","read_digital","write_angle","set_pwm","pwm_set"].indexOf(m[3])>=0){color=TH.mth;}
      }
      else if(m[4]){color=TH.num;}
      else if(m[6]){color=TH.op;}
      txt=txt.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      html+='<span style="color:'+color+";font-weight:"+fw+'">'+txt+"</span>";
    }
  });
  return html;
}

        alert("❌ No se pudo cargar datos.\nVerifica:\n1. URL de Apps Script correcta\n2. Desplegado como 'Cualquiera'\n3. Script autorizado");
        return;
      }
      setTg(function(prevTg){
        var newTg=Object.assign({},prevTg);
        setSub(function(prevSub){
          var newSub=Object.assign({},prevSub);
          setProj(function(prevProj){
            var newProj=Object.assign({},prevProj);
            res.data.forEach(function(row){
              var sid=Number(row.studentId);if(!sid&&sid!==0)return;
              if(row.project){newProj[sid]=row.project;newSub[sid]=true;}
              var g=newTg[sid]||{};
              if(row.quizScore!==""&&row.quizScore!=null)g.quizAuto=Number(row.quizScore);
              if(row.quiz_prof!==""&&row.quiz_prof!=null)g.quiz=Number(row.quiz_prof);
              if(row.part!==""&&row.part!=null)g.part=Number(row.part);
              for(var i=0;i<10;i++){
                var rv=row["r"+i];
                if(rv!==""&&rv!=null)g["r"+i]=Number(rv);
              }
              newTg[sid]=g;
            });
            return newProj;
          });
          return newSub;
        });
        setSync("ok");
        setTimeout(function(){setSync("idle");},2000);
        return newTg;
      });
    }).catch(function(e){
      console.error("loadFromGS:",e);
      setSync("error");
    });
  };

  // Cargar automáticamente al entrar en vista profesor
  useEffect(function(){
    if(view==="teacher"&&gsUrl)loadFromGS();
  },[view]);

  // ── Enviar respuestas del alumno a Google Sheets ──
  const submitQuiz=function(sid){
    setSub(function(p){return Object.assign({},p,{[sid]:true});});
    if(!gsUrl)return;
    var st=students.find(function(x){return x.id===sid;});
    gsSend("submit",{
      studentId:sid,
      studentName:st?st.n:"",
      groupId:st?st.g:"",
      project:proj[sid]||"",
      quizScore:qScore(sid)
    });
    setSync("ok");setTimeout(function(){setSync("idle");},2500);
  };

  // ── Guardar evaluación del profesor a Google Sheets (con debounce) ──
  const saveTimer=useRef(null);
  const saveToGS=function(sid,field,value){
    if(!gsUrl)return;
    if(saveTimer.current)clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(function(){
      var st=students.find(function(x){return x.id===sid;});
      var payload={studentId:sid,studentName:st?st.n:"",groupId:st?st.g:""};
      payload[field]=value;
      gsSend("save",payload);
      setSync("ok");setTimeout(function(){setSync("idle");},1500);
    },800);
  };
  const[newStu,setNewStu]=useState("");
  const[newStuG,setNewStuG]=useState("");
  const[newGrp,setNewGrp]=useState("");
  const[newGrpIc,setNewGrpIc]=useState("📦");
  const[editId,setEditId]=useState(null);
  const[editName,setEditName]=useState("");

  const getQs=sid=>{const p=proj[sid];if(!p)return[];var spec=p==="solar"?Q_SOLAR:p==="cohete"?Q_COHETE:Q_LLAMA;return[...Q_COMMON,...spec];};
  const qScore=sid=>{const qs=getQs(sid),a=ans[sid]||{};if(!qs.length)return 0;let c=0;qs.forEach(q=>{if(a[q.id]===q.c)c++;});return+(c/qs.length*10).toFixed(2);};
  const rAvg=sid=>{const g=tg[sid]||{};let s=0,c=0;RUBRIC.forEach((_,i)=>{const v=g["r"+i];if(v&&v>0){s+=n2n(v);c++;}});return c>0?+(s/c).toFixed(2):null;};
  const getQuizVal=sid=>{const g=tg[sid]||{};if(g.quiz!=null)return g.quiz;const a=ans[sid];if(a&&Object.keys(a).length>0)return qScore(sid);return g.quizAuto||0;};
  const fNote=sid=>{const q=getQuizVal(sid)*0.55,g=tg[sid]||{},p=(g.part||0)*0.10,r=rAvg(sid),rb=(r!==null?r:0)*0.35;return+(q+p+rb).toFixed(2);};
  const sG=(sid,k,v)=>{setTg(p=>({...p,[sid]:{...(p[sid]||{}),[k]:v}}));var gk=k==="quiz"?"quiz_prof":k;saveToGS(sid,gk,v);};
  const nextId=()=>Math.max(0,...students.map(s=>s.id))+1;
  const nextGId=()=>Math.max(0,...groups.map(g=>g.id))+1;

  const doLogin=()=>{
    if(!selId){setLoginErr("Selecciona tu nombre.");return;}
    if(!selProj){setLoginErr("Selecciona tu proyecto.");return;}
    const st=students.find(x=>x.id===+selId);if(!st)return;
    setProj(p=>({...p,[st.id]:selProj}));setStu(st);setLoginErr("");setView("student");
  };
  const addStudent=()=>{
    if(!newStu.trim()||newStuG==="")return;
    setStudents(p=>[...p,{id:nextId(),n:newStu.trim(),g:+newStuG}]);setNewStu("");setNewStuG("");
  };
  const addGroup=()=>{
    if(!newGrp.trim())return;
    const id=nextGId();
    setGroups(p=>[...p,{id,n:"Grupo "+id+" — "+newGrpIc+" "+newGrp.trim(),ic:newGrpIc}]);setNewGrp("");
  };
  const saveName=(sid)=>{
    setStudents(p=>p.map(s=>s.id===sid?{...s,n:editName}:s));setEditId(null);
  };
  const delStudent=(sid)=>setStudents(p=>p.filter(s=>s.id!==sid));

  const S={
    card:{background:"#fff",borderRadius:12,padding:18,boxShadow:"0 2px 10px rgba(0,0,0,0.06)",marginBottom:12},
    btn:(bg)=>({background:bg||"#2563eb",color:"#fff",border:"none",borderRadius:8,padding:"8px 16px",cursor:"pointer",fontWeight:600,fontSize:13}),
    hdr:{background:"linear-gradient(135deg,#1e3a5f 0%,#2563eb 100%)",color:"#fff",padding:"12px 18px",display:"flex",alignItems:"center",gap:12,borderRadius:"0 0 14px 14px",marginBottom:16},
    sel:{width:"100%",padding:"10px 12px",borderRadius:8,border:"1px solid #cbd5e1",fontSize:14,background:"#fff"},
    inp:{padding:"8px 10px",borderRadius:7,border:"1px solid #cbd5e1",fontSize:13},
  };

  // ═══ LOGIN ═══
  if(view==="login")return(
    <div style={{minHeight:"100vh",background:"#f0f4f8",fontFamily:"system-ui,sans-serif"}}>

        <div><h1 style={{margin:0,fontSize:18}}>Plataforma de Evaluación</h1><p style={{margin:0,fontSize:11,opacity:.85}}>Tecnología y Digitalización — 3º ESO — IES Valle del Jerte</p></div>

          <div key={q.id} style={{...S.card,borderLeft:"4px solid "+tc}}>

                  br=sel?"#7c8aff":"#3b3b5c";

                  <td style={{padding:6,fontWeight:600}}>{st.n}{done?" ✅":""}</td>
                  <td style={{padding:6,textAlign:"center",fontSize:11}}>{proj[st.id]==="solar"?"☀️":proj[st.id]==="llama"?"🔥":proj[st.id]==="cohete"?"🚀":"—"}</td>
                  <td style={{padding:6,textAlign:"center"}}><input type="number" min="0" max="10" step="0.1" value={g.quiz!=null?g.quiz:""} onChange={e=>sG(st.id,"quiz",e.target.value===""?null:parseFloat(e.target.value)||0)} placeholder={done?qScore(st.id)+"":g.quizAuto!=null?g.quizAuto+"":"—"} style={{width:52,textAlign:"center",padding:2,borderRadius:5,border:"1px solid #ddd"}}/>{done||g.quizAuto!=null?<span style={{fontSize:9,color:"#888",marginLeft:2}} title="Nota auto-corregida">{done?qScore(st.id):g.quizAuto}</span>:null}</td>
                  <td style={{padding:6,textAlign:"center"}}><input type="number" min="0" max="10" step="0.5" value={g.part!=null?g.part:""} onChange={e=>sG(st.id,"part",parseFloat(e.target.value)||0)} style={{width:48,textAlign:"center",padding:2,borderRadius:5,border:"1px solid #ddd"}}/></td>
                  <td style={{padding:6,textAlign:"center"}}><button onClick={()=>{setCommentModal(st.id);setCommentDraft(comments[st.id]||"");}} style={{...S.btn(comments[st.id]?"#16a34a":"#94a3b8"),fontSize:10,padding:"2px 8px"}} title={comments[st.id]||"Sin comentarios"}>{comments[st.id]?"📝":"💬"}</button></td>
                  <td style={{padding:6,textAlign:"center"}}><button onClick={()=>{setCanvaModal(st.id);setCanvaDraft(canvaNotes[st.id]||"");}} style={{...S.btn(canvaNotes[st.id]?"#e08700":"#94a3b8"),fontSize:10,padding:"2px 8px"}} title={canvaNotes[st.id]||"Sin anotaciones Canva"}>{canvaNotes[st.id]?"🎨":"🖼️"}</button></td>
                  <td style={{padding:6,textAlign:"center"}}><button onClick={()=>setModal(st.id)} style={{...S.btn("#7c3aed"),fontSize:10,padding:"2px 8px"}}>📋{ra!==null?" "+ra:""}</button></td>
                  <td style={{padding:6,textAlign:"center",fontWeight:700,color:qC(q),fontSize:13}}>{nf}<br/><span style={{fontSize:9,fontWeight:400}}>{q}</span></td>
                  <td style={{padding:6,textAlign:"center"}}><button onClick={()=>{setRepStu(st.id);setView("report");}} style={{...S.btn("#16a34a"),fontSize:10,padding:"2px 8px"}}>📄</button></td>
                </tr>);
              })}</tbody>
            </table></div>
          </div>);
        })}
      </div>


      {/* COMMENT MODAL */}
      {commentModal!==null&&(()=>{
        const cst=students.find(x=>x.id===commentModal);
        return(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999}}>
          <div style={{background:"#fff",borderRadius:14,padding:20,maxWidth:500,width:"92%"}}>
            <h3 style={{marginTop:0,color:"#1e3a5f",fontSize:15}}>💬 Comentarios — {cst&&cst.n}</h3>
            <p style={{fontSize:11,color:"#888",margin:"0 0 8px"}}>Justifica la nota de participación: actitud, trabajo en equipo, iniciativa, comportamiento...</p>
            <textarea value={commentDraft} onChange={e=>setCommentDraft(e.target.value)} placeholder="Ej: Participa activamente, colabora con su grupo, muestra iniciativa..." style={{width:"100%",minHeight:120,padding:10,borderRadius:8,border:"1px solid #cbd5e1",fontSize:13,fontFamily:"system-ui,sans-serif",resize:"vertical",boxSizing:"border-box"}}/>
            <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:12}}>
              <button onClick={()=>setCommentModal(null)} style={S.btn("#94a3b8")}>Cancelar</button>
              <button onClick={()=>{setComments(p=>({...p,[commentModal]:commentDraft}));if(gsUrl){saveToGS(commentModal,"comment",commentDraft);}setCommentModal(null);}} style={S.btn("#16a34a")}>💾 Guardar</button>
            </div>
          </div>
        </div>);
      })()}


      {/* CANVA MODAL */}
      {canvaModal!==null&&(()=>{
        const cvst=students.find(x=>x.id===canvaModal);
        return(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999}}>
          <div style={{background:"#fff",borderRadius:14,padding:20,maxWidth:500,width:"92%"}}>
            <h3 style={{marginTop:0,color:"#1e3a5f",fontSize:15}}>🎨 Presentación Canva — {cvst&&cvst.n}</h3>
            <p style={{fontSize:11,color:"#888",margin:"0 0 8px"}}>Anota observaciones sobre la presentación: diseño, estructura, contenido, ortografía, creatividad, uso de recursos visuales...</p>
            <textarea value={canvaDraft} onChange={e=>setCanvaDraft(e.target.value)} placeholder="Ej: Buena estructura visual, uso adecuado de imágenes y esquemas. Mejorar la ortografía en las diapositivas 3 y 5. Falta la bibliografía..." style={{width:"100%",minHeight:120,padding:10,borderRadius:8,border:"1px solid #cbd5e1",fontSize:13,fontFamily:"system-ui,sans-serif",resize:"vertical",boxSizing:"border-box"}}/>
            <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:12}}>
              <button onClick={()=>setCanvaModal(null)} style={S.btn("#94a3b8")}>Cancelar</button>
              <button onClick={()=>{setCanvaNotes(p=>({...p,[canvaModal]:canvaDraft}));if(gsUrl){saveToGS(canvaModal,"canvaNote",canvaDraft);}setCanvaModal(null);}} style={S.btn("#e08700")}>💾 Guardar</button>
            </div>
          </div>
        </div>);
      })()}

      {/* RUBRIC MODAL */}
      {modal!==null&&(()=>{
        const st=students.find(x=>x.id===modal),g=tg[modal]||{};
        return(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999}}>
          <div style={{background:"#fff",borderRadius:14,padding:20,maxWidth:600,width:"92%",maxHeight:"88vh",overflow:"auto"}}>
            <h3 style={{marginTop:0,color:"#1e3a5f",fontSize:15}}>📋 Rúbrica — {st&&st.n}</h3>
            <p style={{fontSize:10,color:"#888",margin:"0 0 12px"}}>Decreto 110/2022 · TyD 3º ESO · Extremadura</p>
            {RUBRIC.map((r,i)=>{
              const val=g["r"+i]||0,niv=NIV[val];
              return(
              <div key={i} style={{marginBottom:10,padding:8,background:"#f8fafc",borderRadius:7,borderLeft:"3px solid "+niv.c}}>
                <p style={{margin:"0 0 1px",fontWeight:700,fontSize:12}}>{r.ce} — {r.t} <span style={{fontWeight:400,color:"#888",fontSize:10}}>(Crit. {r.cr})</span></p>
                <p style={{margin:"0 0 5px",fontSize:10,color:"#555"}}>{r.d}</p>
                <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
                  {NIV.slice(1).map(n=>(
                    <button key={n.v} onClick={()=>sG(modal,"r"+i,n.v)}
                      style={{...S.btn(val===n.v?n.c:"#e2e8f0"),color:val===n.v?"#fff":"#333",fontSize:10,padding:"3px 8px"}}>{n.l}</button>
                  ))}
                </div>
              </div>);
            })}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:12}}>
              <span style={{fontWeight:600,fontSize:13}}>Media: {rAvg(modal)!=null?rAvg(modal):"—"}</span>
              <button onClick={()=>setModal(null)} style={S.btn()}>Cerrar</button>
            </div>
          </div>
        </div>);
      })()}
    </div>);
  }

  // ═══ REPORT ═══
  if(view==="report"&&repStu!==null){
    const st=students.find(x=>x.id===repStu),g=tg[repStu]||{},done=sub[repStu];
    const nf=fNote(repStu),q=nQ(nf),ra=rAvg(repStu),qs=getQuizVal(repStu);
    const pL=proj[repStu]==="solar"?"☀️ Seguidor Solar":proj[repStu]==="cohete"?"🚀 Cohete Hidráulico":proj[repStu]==="llama"?"🔥 Detector de Llama":"—";
    return(
    <div style={{minHeight:"100vh",background:"#f0f4f8",fontFamily:"system-ui,sans-serif"}}>
      <div style={{...S.hdr,justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}><img src={LOGO} alt="" style={{height:34,borderRadius:8}}/><h1 style={{margin:0,fontSize:16}}>Informe de Evaluación</h1></div>
        <div style={{display:"flex",gap:5}}>
          <button onClick={()=>window.print()} style={S.btn("#f59e0b")}>🖨️</button>
          <button onClick={()=>setView("teacher")} style={S.btn("#ffffff30")}>← Volver</button>
        </div>
      </div>
      <div style={{maxWidth:700,margin:"0 auto",padding:"0 12px 28px"}}>
        <div style={S.card}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"start",flexWrap:"wrap",gap:10}}>
            <div>
              <h2 style={{margin:"0 0 2px",fontSize:18,color:"#1e3a5f"}}>{st&&st.n}</h2>
              <p style={{margin:0,fontSize:12,color:"#666"}}>{groups.find(gr=>gr.id===(st&&st.g))&&groups.find(gr=>gr.id===st.g).n}</p>
              <p style={{margin:"2px 0",fontSize:11,color:"#888"}}>Proyecto: {pL}</p>
              <p style={{margin:0,fontSize:10,color:"#aaa"}}>TyD 3º ESO — Curso 2025/26 — IES Valle del Jerte</p>
            </div>
            <div style={{textAlign:"center",padding:"7px 14px",borderRadius:12,background:qC(q)+"20",border:"2px solid "+qC(q)}}>
              <p style={{margin:0,fontSize:26,fontWeight:800,color:qC(q)}}>{nf}</p>
              <p style={{margin:0,fontSize:12,fontWeight:600,color:qC(q)}}>{q}</p>
            </div>
          </div>
        </div>
        <div style={S.card}>
          <h3 style={{margin:"0 0 8px",fontSize:14,color:"#1e3a5f"}}>📊 Desglose</h3>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
            <tbody>
              {[["Cuestionario (55%)",(done||g.quiz!=null)?qs:"—","#3b82f6"],["Participación (10%)",g.part!=null?g.part:"—","#8b5cf6"],["Rúbrica CE (35%)",ra!=null?ra:"—","#7c3aed"]].map(function(row,i){
                return <tr key={i} style={{borderBottom:"1px solid #f1f5f9"}}><td style={{padding:"8px 6px"}}>{row[0]}</td><td style={{padding:"8px 6px",textAlign:"right",fontWeight:700,color:row[2]}}>{row[1]}/10</td></tr>;
              })}
              <tr style={{background:"#f8fafc"}}><td style={{padding:"10px 6px",fontWeight:700}}>Nota Final</td><td style={{padding:"10px 6px",textAlign:"right",fontWeight:800,fontSize:16,color:qC(q)}}>{nf}</td></tr>
            </tbody>
          </table>
        </div>
        {(comments[repStu]||canvaNotes[repStu])&&<div style={S.card}>
          <h3 style={{margin:"0 0 8px",fontSize:14,color:"#1e3a5f"}}>📋 Observaciones del Profesor</h3>
          {comments[repStu]&&<div style={{marginBottom:canvaNotes[repStu]?12:0}}>
            <h4 style={{margin:"0 0 6px",fontSize:13,color:"#475569"}}>1. Participación</h4>
            <div style={{background:"#f8fafc",borderRadius:8,padding:12,borderLeft:"3px solid #8b5cf6"}}>
              <p style={{margin:0,fontSize:12,color:"#334155",lineHeight:1.6,whiteSpace:"pre-wrap"}}>{comments[repStu]}</p>
            </div>
          </div>}
          {canvaNotes[repStu]&&<div>
            <h4 style={{margin:"0 0 6px",fontSize:13,color:"#475569"}}>2. Presentación Canva</h4>
            <div style={{background:"#fffbeb",borderRadius:8,padding:12,borderLeft:"3px solid #e08700"}}>
              <p style={{margin:0,fontSize:12,color:"#334155",lineHeight:1.6,whiteSpace:"pre-wrap"}}>{canvaNotes[repStu]}</p>
            </div>
          </div>}
        </div>}
        <div style={S.card}>
          <h3 style={{margin:"0 0 3px",fontSize:14,color:"#1e3a5f"}}>📋 Rúbrica por Criterios de Evaluación</h3>
          <p style={{fontSize:10,color:"#888",margin:"0 0 10px"}}>Decreto 110/2022 · TyD 3º ESO · Extremadura</p>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
            <thead><tr style={{background:"#f1f5f9"}}><th style={{padding:6,textAlign:"left"}}>CE</th><th style={{padding:6,textAlign:"left"}}>Descripción</th><th style={{padding:6,textAlign:"center",minWidth:85}}>Nivel</th></tr></thead>
            <tbody>{RUBRIC.map((r,i)=>{
              const val=g["r"+i]||0,niv=NIV[val];
              return(<tr key={i} style={{borderBottom:"1px solid #f1f5f9"}}>
                <td style={{padding:6,fontWeight:600,verticalAlign:"top",whiteSpace:"nowrap"}}>{r.ce} ({r.cr})<br/><span style={{fontWeight:400,fontSize:10,color:"#888"}}>{r.t}</span></td>
                <td style={{padding:6,fontSize:10,color:"#555"}}>{r.d}<br/><span style={{color:"#bbb",fontSize:9}}>Saberes: {r.sb} · {r.pf}</span></td>
                <td style={{padding:6,textAlign:"center",fontWeight:600,color:niv.c,background:niv.bg,borderRadius:5}}>{niv.l}</td>
              </tr>);
            })}</tbody>
          </table>
        </div>
        <div style={S.card}>
          <h3 style={{margin:"0 0 3px",fontSize:14,color:"#1e3a5f"}}>🎯 Competencias Clave</h3>
          <p style={{fontSize:10,color:"#888",margin:"0 0 8px"}}>Perfil de salida · LOMLOE · Extremadura</p>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(110px,1fr))",gap:6}}>
            {COMPS.map(c=>{const l=cL(nf),colors=cC(l);
              return(<div key={c} style={{background:colors[0],borderRadius:9,padding:"8px",textAlign:"center",border:"1px solid "+colors[1]+"30"}}>
                <p style={{margin:0,fontWeight:800,fontSize:14,color:colors[1]}}>{c}</p>
                <p style={{margin:"2px 0 0",fontSize:9,fontWeight:600,color:colors[1]}}>{l}</p>
              </div>);
            })}
          </div>
        </div>
      </div>
    </div>);
  }

  // ═══ REPORT ALL (PRINT) ═══
  if(view==="reportAll"){
    const allSts=students.filter(s=>s.id!=="test");
    return(
    <div style={{minHeight:"100vh",background:"#fff",fontFamily:"system-ui,sans-serif"}}>
      <div className="no-print" style={{...S.hdr,justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}><img src={LOGO} alt="" style={{height:34,borderRadius:8}}/><h1 style={{margin:0,fontSize:16}}>Informes — Todos los alumnos</h1></div>
        <div style={{display:"flex",gap:5}}>
          <button onClick={()=>window.print()} style={S.btn("#f59e0b")}>🖨️ Imprimir / PDF</button>
          <button onClick={()=>{setPrintAll(false);setView("teacher");}} style={S.btn("#ffffff30")}>← Volver</button>
        </div>
      </div>
      <div style={{maxWidth:700,margin:"0 auto",padding:"0 12px 28px"}}>
        {allSts.map((st,idx)=>{
          const g=tg[st.id]||{},done=sub[st.id];
          const nf=fNote(st.id),q=nQ(nf),ra=rAvg(st.id),qs=getQuizVal(st.id);
          const pL=proj[st.id]==="solar"?"☀️ Seguidor Solar":proj[st.id]==="cohete"?"🚀 Cohete Hidráulico":proj[st.id]==="llama"?"🔥 Detector de Llama":"—";
          return(
          <div key={st.id} className={idx<allSts.length-1?"page-break":""} style={{marginBottom:20}}>
            <div className="report-card" style={S.card}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"start",flexWrap:"wrap",gap:10}}>
                <div>
                  <h2 style={{margin:"0 0 2px",fontSize:18,color:"#1e3a5f"}}>{st.n}</h2>
                  <p style={{margin:0,fontSize:12,color:"#666"}}>{groups.find(gr=>gr.id===st.g)&&groups.find(gr=>gr.id===st.g).n}</p>
                  <p style={{margin:"2px 0",fontSize:11,color:"#888"}}>Proyecto: {pL}</p>
                  <p style={{margin:0,fontSize:10,color:"#aaa"}}>TyD 3º ESO — Curso 2025/26 — IES Valle del Jerte</p>
                </div>
                <div style={{textAlign:"center",padding:"7px 14px",borderRadius:12,background:qC(q)+"20",border:"2px solid "+qC(q)}}>
                  <p style={{margin:0,fontSize:26,fontWeight:800,color:qC(q)}}>{nf}</p>
                  <p style={{margin:0,fontSize:12,fontWeight:600,color:qC(q)}}>{q}</p>
                </div>
              </div>
            </div>
            <div className="report-card" style={S.card}>
              <h3 style={{margin:"0 0 8px",fontSize:14,color:"#1e3a5f"}}>📊 Desglose</h3>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <tbody>
                  {[["Cuestionario (55%)",(done||g.quiz!=null)?qs:"—","#3b82f6"],["Participación (10%)",g.part!=null?g.part:"—","#8b5cf6"],["Rúbrica CE (35%)",ra!=null?ra:"—","#7c3aed"]].map(function(row,i){
                    return <tr key={i} style={{borderBottom:"1px solid #f1f5f9"}}><td style={{padding:"8px 6px"}}>{row[0]}</td><td style={{padding:"8px 6px",textAlign:"right",fontWeight:700,color:row[2]}}>{row[1]}/10</td></tr>;
                  })}
                  <tr style={{background:"#f8fafc"}}><td style={{padding:"10px 6px",fontWeight:700}}>Nota Final</td><td style={{padding:"10px 6px",textAlign:"right",fontWeight:800,fontSize:16,color:qC(q)}}>{nf}</td></tr>
                </tbody>
              </table>
            </div>
            {(comments[st.id]||canvaNotes[st.id])&&<div className="report-card" style={S.card}>
              <h3 style={{margin:"0 0 8px",fontSize:14,color:"#1e3a5f"}}>📋 Observaciones del Profesor</h3>
              {comments[st.id]&&<div style={{marginBottom:canvaNotes[st.id]?12:0}}>
                <h4 style={{margin:"0 0 6px",fontSize:13,color:"#475569"}}>1. Participación</h4>
                <div style={{background:"#f8fafc",borderRadius:8,padding:12,borderLeft:"3px solid #8b5cf6"}}>
                  <p style={{margin:0,fontSize:12,color:"#334155",lineHeight:1.6,whiteSpace:"pre-wrap"}}>{comments[st.id]}</p>
                </div>
              </div>}
              {canvaNotes[st.id]&&<div>
                <h4 style={{margin:"0 0 6px",fontSize:13,color:"#475569"}}>2. Presentación Canva</h4>
                <div style={{background:"#fffbeb",borderRadius:8,padding:12,borderLeft:"3px solid #e08700"}}>
                  <p style={{margin:0,fontSize:12,color:"#334155",lineHeight:1.6,whiteSpace:"pre-wrap"}}>{canvaNotes[st.id]}</p>
                </div>
              </div>}
            </div>}
            <div className="report-card" style={S.card}>
              <h3 style={{margin:"0 0 3px",fontSize:14,color:"#1e3a5f"}}>📋 Rúbrica por Criterios de Evaluación</h3>
              <p style={{fontSize:10,color:"#888",margin:"0 0 10px"}}>Decreto 110/2022 · TyD 3º ESO · Extremadura</p>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                <thead><tr style={{background:"#f1f5f9"}}><th style={{padding:6,textAlign:"left"}}>CE</th><th style={{padding:6,textAlign:"left"}}>Descripción</th><th style={{padding:6,textAlign:"center",minWidth:85}}>Nivel</th></tr></thead>
                <tbody>{RUBRIC.map((r,ri)=>{
                  const val=g["r"+ri]||0,niv=NIV[val];
                  return(<tr key={ri} style={{borderBottom:"1px solid #f1f5f9"}}>
                    <td style={{padding:6,fontWeight:600,verticalAlign:"top",whiteSpace:"nowrap"}}>{r.ce} ({r.cr})<br/><span style={{fontWeight:400,fontSize:10,color:"#888"}}>{r.t}</span></td>
                    <td style={{padding:6,fontSize:10,color:"#555"}}>{r.d}<br/><span style={{color:"#bbb",fontSize:9}}>Saberes: {r.sb} · {r.pf}</span></td>
                    <td style={{padding:6,textAlign:"center",fontWeight:600,color:niv.c,background:niv.bg,borderRadius:5}}>{niv.l}</td>
                  </tr>);
                })}</tbody>
              </table>
            </div>
            <div className="report-card" style={S.card}>
              <h3 style={{margin:"0 0 3px",fontSize:14,color:"#1e3a5f"}}>🎯 Competencias Clave</h3>
              <p style={{fontSize:10,color:"#888",margin:"0 0 8px"}}>Perfil de salida · LOMLOE · Extremadura</p>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(110px,1fr))",gap:6}}>
                {COMPS.map(c=>{const l=cL(nf),colors=cC(l);
                  return(<div key={c} style={{background:colors[0],borderRadius:9,padding:"8px",textAlign:"center",border:"1px solid "+colors[1]+"30"}}>
                    <p style={{margin:0,fontWeight:800,fontSize:14,color:colors[1]}}>{c}</p>
                    <p style={{margin:"2px 0 0",fontSize:9,fontWeight:600,color:colors[1]}}>{l}</p>
                  </div>);
                })}
              </div>
            </div>
          </div>);
        })}
      </div>
    </div>);
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
